name: Server Status

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to check'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - logs-bot
          - logs-nginx
          - logs-errors
          - disk-cleanup
      lines:
        description: 'Number of log lines'
        required: false
        default: '50'

permissions:
  contents: read

jobs:
  server-action:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout server helper
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/server_ops.sh

      - name: Upload server helper
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: scripts/server_ops.sh
          target: /tmp/academic_saloon_ops
          overwrite: true

      - name: Execute server action
        uses: appleboy/ssh-action@v1.0.3
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          ACTION_TYPE: ${{ github.event.inputs.action }}
          ACTION_LINES: ${{ github.event.inputs.lines }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REMOTE_OPS_PATH: /tmp/academic_saloon_ops/scripts/server_ops.sh
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 90s
          envs: NOTIFY_CHAT_ID,ACTION_TYPE,ACTION_LINES,GH_RUN_URL,REMOTE_OPS_PATH
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/academic_saloon" bash "$REMOTE_OPS_PATH" "$ACTION_TYPE" "$ACTION_LINES"

      - name: Send fallback notification
        if: always() && github.event.inputs.action != 'status'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>◈ СЕРВЕР</b> <code>${{ github.event.inputs.action }}</code>

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Полный вывод</a>
