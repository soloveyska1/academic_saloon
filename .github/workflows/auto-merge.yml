name: Auto-Merge Claude Branches

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to merge (leave empty for current)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge to main
        id: merge
        run: |
          set -e

          if [ -n "${{ github.event.inputs.branch }}" ]; then
            BRANCH="${{ github.event.inputs.branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          SHORT_BRANCH=$(echo "$BRANCH" | sed 's|claude/||')
          echo "branch=$SHORT_BRANCH" >> $GITHUB_OUTPUT

          git fetch origin main
          git fetch origin "$BRANCH"

          COMMIT_COUNT=$(git log --oneline origin/main..origin/$BRANCH --no-merges | wc -l)
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

          set +e
          COMMITS=$(git log --oneline origin/main..origin/$BRANCH --no-merges --format='%s' | head -5 | sed 's/^/▸ /')
          FILES_STAT=$(git diff --stat origin/main..origin/$BRANCH | tail -1)
          PY=$(git diff --name-only origin/main..origin/$BRANCH | grep -c '\.py$' || true)
          TS=$(git diff --name-only origin/main..origin/$BRANCH | grep -cE '\.(tsx?|css)$' || true)
          YML=$(git diff --name-only origin/main..origin/$BRANCH | grep -c '\.yml$' || true)
          set -e

          FILE_TAGS=""
          [ "$PY" -gt 0 ] 2>/dev/null && FILE_TAGS="${FILE_TAGS}py:${PY} "
          [ "$TS" -gt 0 ] 2>/dev/null && FILE_TAGS="${FILE_TAGS}ts:${TS} "
          [ "$YML" -gt 0 ] 2>/dev/null && FILE_TAGS="${FILE_TAGS}ci:${YML} "

          {
            echo "MERGE_COMMITS<<ENDOFCOMMITS"
            echo "$COMMITS"
            echo "ENDOFCOMMITS"
          } >> $GITHUB_ENV

          echo "files=${FILES_STAT:-нет изменений}" >> $GITHUB_OUTPUT
          echo "file_tags=${FILE_TAGS}" >> $GITHUB_OUTPUT

          git checkout main
          git merge "origin/$BRANCH" --no-ff -m "Auto-merge: $BRANCH -> main"
          git push origin main

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>↓ МЕРЖ</b>  <code>${{ steps.merge.outputs.branch }}</code>  <b>${{ steps.merge.outputs.commit_count }} коммитов</b>

            ${{ env.MERGE_COMMITS }}

            <code>${{ steps.merge.outputs.file_tags }}— ${{ steps.merge.outputs.files }}</code>

            <i>Деплой запускается...</i>

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ МЕРЖ УПАЛ</b>  <code>${{ github.ref_name }}</code>

            Возможен конфликт.
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Логи</a>
