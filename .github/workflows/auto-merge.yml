name: Auto-Merge Claude Branches

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to merge (leave empty for current)'
        required: false

concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: mini-app/node_modules
          key: node-modules-${{ hashFiles('mini-app/package-lock.json') }}

      - name: Install if cache miss
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: cd mini-app && npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge to main
        id: merge
        run: |
          set -e

          if [ -n "${{ github.event.inputs.branch }}" ]; then
            BRANCH="${{ github.event.inputs.branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          echo "full_branch=$BRANCH" >> $GITHUB_OUTPUT
          SHORT_BRANCH=$(echo "$BRANCH" | sed 's|claude/||')
          echo "branch=$SHORT_BRANCH" >> $GITHUB_OUTPUT

          git fetch origin main
          git fetch origin "$BRANCH"

          # ── TypeScript check on the branch before merge ──
          TS_CHANGED=$(git diff --name-only origin/main..origin/$BRANCH | grep -cE '\.(tsx?|css)$' || true)
          if [ "$TS_CHANGED" -gt 0 ]; then
            echo "Frontend files changed — running TypeScript check..."
            git checkout "origin/$BRANCH" --quiet
            cd mini-app
            ./node_modules/.bin/tsc --noEmit
            if [ $? -ne 0 ]; then
              echo "TypeScript errors on branch $BRANCH — merge blocked"
              exit 1
            fi
            echo "TypeScript check passed"
            cd ..
            git checkout - --quiet
          fi

          COMMIT_COUNT=$(git log --oneline origin/main..origin/$BRANCH --no-merges | wc -l)
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

          set +e
          COMMITS=$(git log --oneline origin/main..origin/$BRANCH --no-merges --format='%s' | head -5)
          FILES_STAT=$(git diff --stat origin/main..origin/$BRANCH | tail -1)
          PY=$(git diff --name-only origin/main..origin/$BRANCH | grep -c '\.py$' || true)
          TS=$(git diff --name-only origin/main..origin/$BRANCH | grep -cE '\.(tsx?|css)$' || true)
          YML=$(git diff --name-only origin/main..origin/$BRANCH | grep -c '\.yml$' || true)

          INS=$(git diff --shortstat origin/main..origin/$BRANCH | grep -oP '\d+(?= insertion)' || echo "0")
          DELS=$(git diff --shortstat origin/main..origin/$BRANCH | grep -oP '\d+(?= deletion)' || echo "0")
          set -e

          FILE_TAGS=""
          [ "$PY" -gt 0 ] 2>/dev/null && FILE_TAGS="${FILE_TAGS}py:${PY} "
          [ "$TS" -gt 0 ] 2>/dev/null && FILE_TAGS="${FILE_TAGS}ts:${TS} "
          [ "$YML" -gt 0 ] 2>/dev/null && FILE_TAGS="${FILE_TAGS}ci:${YML} "

          {
            echo "MERGE_COMMITS<<ENDOFCOMMITS"
            echo "$COMMITS"
            echo "ENDOFCOMMITS"
          } >> $GITHUB_ENV

          echo "files=${FILES_STAT:-нет изменений}" >> $GITHUB_OUTPUT
          echo "file_tags=${FILE_TAGS}" >> $GITHUB_OUTPUT
          echo "insertions=${INS:-0}" >> $GITHUB_OUTPUT
          echo "deletions=${DELS:-0}" >> $GITHUB_OUTPUT

          git checkout main
          git merge "origin/$BRANCH" --no-ff -m "Auto-merge: $BRANCH -> main"
          git push origin main

      - name: Trigger deploy workflow
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Send merge notification via SSH
        if: success()
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          MERGE_BRANCH: ${{ steps.merge.outputs.full_branch }}
          MERGE_COMMIT_COUNT: ${{ steps.merge.outputs.commit_count }}
          MERGE_COMMITS_TEXT: ${{ env.MERGE_COMMITS }}
          MERGE_FILE_TAGS: ${{ steps.merge.outputs.file_tags }}
          MERGE_FILES_STAT: ${{ steps.merge.outputs.files }}
          MERGE_INSERTIONS: ${{ steps.merge.outputs.insertions }}
          MERGE_DELETIONS: ${{ steps.merge.outputs.deletions }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15s
          envs: NOTIFY_CHAT_ID,MERGE_BRANCH,MERGE_COMMIT_COUNT,MERGE_COMMITS_TEXT,MERGE_FILE_TAGS,MERGE_FILES_STAT,MERGE_INSERTIONS,MERGE_DELETIONS
          script: |
            cd ~/academic_saloon
            git fetch origin main --quiet
            git checkout main --quiet 2>/dev/null
            git reset --hard origin/main --quiet

            source venv/bin/activate

            python3 scripts/deploy_notify.py \
              --mode merge \
              --chat-id "$NOTIFY_CHAT_ID" \
              --branch "$MERGE_BRANCH" \
              --commit-count "$MERGE_COMMIT_COUNT" \
              --commits "$MERGE_COMMITS_TEXT" \
              --file-tags "$MERGE_FILE_TAGS" \
              --files-stat "$MERGE_FILES_STAT" \
              --insertions "${MERGE_INSERTIONS:-0}" \
              --deletions "${MERGE_DELETIONS:-0}" \
              || echo "Merge notification failed (non-fatal)"

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ МЕРЖ УПАЛ</b>  <code>${{ github.ref_name }}</code>

            Возможен конфликт.
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Логи</a>
