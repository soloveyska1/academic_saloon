name: Auto-Merge Claude Branches

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to merge (leave empty for current)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge to main
        id: merge
        run: |
          set -e

          if [ -n "${{ github.event.inputs.branch }}" ]; then
            BRANCH="${{ github.event.inputs.branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          # Short branch name for display
          SHORT_BRANCH=$(echo "$BRANCH" | sed 's|claude/||')
          echo "branch=$SHORT_BRANCH" >> $GITHUB_OUTPUT

          git fetch origin main
          git fetch origin "$BRANCH"

          # Count commits being merged
          COMMIT_COUNT=$(git log --oneline origin/main..origin/$BRANCH --no-merges | wc -l)
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

          # Get commit summaries
          COMMITS=$(git log --oneline origin/main..origin/$BRANCH --no-merges --format='%s' | head -5 | sed 's/^/• /')
          echo "MERGE_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Files changed
          FILES=$(git diff --stat origin/main..origin/$BRANCH | tail -1)
          echo "files=$FILES" >> $GITHUB_OUTPUT

          git checkout main
          git merge "origin/$BRANCH" --no-ff -m "Auto-merge: $BRANCH -> main"
          git push origin main

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *MERGE*  `${{ steps.merge.outputs.branch }}`  *${{ steps.merge.outputs.commit_count }} commits*

            ${{ env.MERGE_COMMITS }}

            ${{ steps.merge.outputs.files }}

            Deploy starts...

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *MERGE FAILED*  `${{ github.ref_name }}`

            Possible conflict. [Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
