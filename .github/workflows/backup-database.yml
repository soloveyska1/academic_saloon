name: Database Backup

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      notify:
        description: 'Send Telegram notification'
        required: false
        default: 'true'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Create backup and upload
        uses: appleboy/ssh-action@v1.0.3
        id: backup
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          SHOULD_NOTIFY: ${{ github.event.inputs.notify || 'true' }}
          TRIGGER: ${{ github.event.schedule && '07:00 МСК авто' || 'ручной' }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NOTIFY_CHAT_ID,SHOULD_NOTIFY,TRIGGER,GH_RUN_URL
          script: |
            set -e

            BACKUP_DIR="/root/backups"
            DATE=$(date +%Y-%m-%d_%H-%M-%S)
            BACKUP_FILE="academic_saloon_${DATE}.sql.gz"
            YADISK_FOLDER="Academic_Saloon_Backups"

            mkdir -p $BACKUP_DIR

            cd ~/academic_saloon
            export POSTGRES_USER=$(grep -E '^POSTGRES_USER=' .env | cut -d'=' -f2-)
            export POSTGRES_PASSWORD=$(grep -E '^POSTGRES_PASSWORD=' .env | cut -d'=' -f2-)
            export POSTGRES_DB=$(grep -E '^POSTGRES_DB=' .env | cut -d'=' -f2-)
            export POSTGRES_HOST=$(grep -E '^POSTGRES_HOST=' .env | cut -d'=' -f2-)
            export POSTGRES_PORT=$(grep -E '^POSTGRES_PORT=' .env | cut -d'=' -f2-)
            export YANDEX_DISK_TOKEN=$(grep -E '^YANDEX_DISK_TOKEN=' .env | cut -d'=' -f2-)

            # Dump
            PGPASSWORD=$POSTGRES_PASSWORD pg_dump -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER $POSTGRES_DB | gzip > $BACKUP_DIR/$BACKUP_FILE

            BACKUP_SIZE=$(ls -lh $BACKUP_DIR/$BACKUP_FILE | awk '{print $5}')

            # DB stats
            ORDER_COUNT=$(PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER $POSTGRES_DB -t -c "SELECT count(*) FROM orders" 2>/dev/null | tr -d ' ' || echo "?")
            USER_COUNT=$(PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER $POSTGRES_DB -t -c "SELECT count(*) FROM users" 2>/dev/null | tr -d ' ' || echo "?")
            PAID_COUNT=$(PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER $POSTGRES_DB -t -c "SELECT count(*) FROM orders WHERE status IN ('paid', 'paid_full', 'in_progress', 'completed')" 2>/dev/null | tr -d ' ' || echo "?")

            # Upload to Yandex Disk
            curl -s -X PUT -H "Authorization: OAuth $YANDEX_DISK_TOKEN" \
              "https://cloud-api.yandex.net/v1/disk/resources?path=/$YADISK_FOLDER" || true

            UPLOAD_URL=$(curl -s -X GET \
              -H "Authorization: OAuth $YANDEX_DISK_TOKEN" \
              "https://cloud-api.yandex.net/v1/disk/resources/upload?path=/$YADISK_FOLDER/$BACKUP_FILE&overwrite=true" \
              | grep -o '"href":"[^"]*"' | head -1 | cut -d'"' -f4)

            if [ -z "$UPLOAD_URL" ]; then
              echo "ERROR: Failed to get upload URL"
              exit 1
            fi

            curl -s -T $BACKUP_DIR/$BACKUP_FILE "$UPLOAD_URL"

            # Cleanup
            find $BACKUP_DIR -name "academic_saloon_*.sql.gz" -mtime +3 -delete

            OLD_BACKUPS=$(curl -s -X GET \
              -H "Authorization: OAuth $YANDEX_DISK_TOKEN" \
              "https://cloud-api.yandex.net/v1/disk/resources?path=/$YADISK_FOLDER&limit=100&sort=-created" \
              | grep -o '"name":"academic_saloon_[^"]*"' | cut -d'"' -f4 | tail -n +8)

            DELETED=0
            for old_file in $OLD_BACKUPS; do
              curl -s -X DELETE -H "Authorization: OAuth $YANDEX_DISK_TOKEN" \
                "https://cloud-api.yandex.net/v1/disk/resources?path=/$YADISK_FOLDER/$old_file&permanently=true"
              DELETED=$((DELETED + 1))
            done

            CLOUD_COUNT=$(curl -s -X GET \
              -H "Authorization: OAuth $YANDEX_DISK_TOKEN" \
              "https://cloud-api.yandex.net/v1/disk/resources?path=/$YADISK_FOLDER&limit=100" \
              | grep -o '"name":"academic_saloon_[^"]*"' | wc -l || echo "?")

            DISK_PCT=$(df -h / | tail -1 | awk '{print $5}')

            # Send notification from server
            if [ "$SHOULD_NOTIFY" != "false" ]; then
              BOT_TOKEN_VAL=$(grep -E '^BOT_TOKEN=' ~/academic_saloon/.env | cut -d'=' -f2- | tr -d '"' | tr -d "'" | head -1)

              if [ -n "$BOT_TOKEN_VAL" ] && [ -n "$NOTIFY_CHAT_ID" ]; then
                read -r -d '' MSG << ENDMSG || true
            <b>◆ БЭКАП</b>  <code>${TRIGGER}</code>

            <pre>
            Размер   ${BACKUP_SIZE}
            Юзеры    ${USER_COUNT}
            Заказы   ${ORDER_COUNT} (оплаченных: ${PAID_COUNT})
            </pre>
            <code>Облако: ${CLOUD_COUNT} копий · Локально: 3 дня · Диск: ${DISK_PCT}</code>

            <a href="${GH_RUN_URL}">логи</a>
            ENDMSG

                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN_VAL}/sendMessage" \
                  --data-urlencode "chat_id=${NOTIFY_CHAT_ID}" \
                  --data-urlencode "parse_mode=HTML" \
                  --data-urlencode "text=${MSG}" \
                  --data-urlencode "disable_web_page_preview=true" || true
              fi
            fi

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ БЭКАП УПАЛ</b>

            Резервная копия БД не создана.
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Логи</a>
