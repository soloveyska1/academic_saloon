name: Rollback

on:
  workflow_dispatch:
    inputs:
      commits_back:
        description: 'How many commits to rollback (default: 1)'
        required: false
        default: '1'

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/remote_deploy.sh

      - name: Upload rollback helper
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: scripts/remote_deploy.sh
          target: /tmp/academic_saloon_rollback
          overwrite: true

      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          GH_ACTOR: ${{ github.actor }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMITS_BACK: ${{ github.event.inputs.commits_back }}
          REMOTE_HELPER_PATH: /tmp/academic_saloon_rollback/scripts/remote_deploy.sh
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 180s
          envs: NOTIFY_CHAT_ID,GH_ACTOR,GH_RUN_URL,COMMITS_BACK,REMOTE_HELPER_PATH
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/academic_saloon"
            cd "$REPO_DIR"

            FROM_COMMIT=$(git rev-parse --short HEAD)
            FROM_MSG=$(git log -1 --format='%s' | head -c 80)
            git reset --hard "HEAD~${COMMITS_BACK}"
            TO_COMMIT=$(git rev-parse --short HEAD)
            TO_MSG=$(git log -1 --format='%s' | head -c 80)

            BACKEND_CHANGED=false
            FRONTEND_CHANGED=false

            if [ -n "$(git diff --name-only "${TO_COMMIT}..${FROM_COMMIT}" -- bot core database main.py requirements.txt ops/systemd scripts/remote_deploy.sh scripts/systemd_prestart.sh scripts/systemd_reload.sh scripts/deploy_notify.py)" ]; then
              BACKEND_CHANGED=true
            fi

            if [ -n "$(git diff --name-only "${TO_COMMIT}..${FROM_COMMIT}" -- mini-app)" ]; then
              FRONTEND_CHANGED=true
            fi

            export REPO_DIR
            export OLD_COMMIT="$FROM_COMMIT"
            export NEW_COMMIT="$TO_COMMIT"
            export BACKEND_CHANGED
            export FRONTEND_CHANGED
            export FRONTEND_BUILD_MODE=local
            export SKIP_DB_MIGRATIONS=true
            export SEND_DEPLOY_NOTIFICATION=false
            export DEPLOY_START="$(date +%s)"

            bash "$REMOTE_HELPER_PATH"

            BOT_OK="✗"
            if systemctl is-active --quiet saloon-bot; then
              BOT_OK="●"
            fi

            FRONTEND_LABEL="без изменений"
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              FRONTEND_LABEL="пересобран локально"
            fi

            BACKEND_LABEL="без изменений"
            if [ "$BACKEND_CHANGED" = "true" ]; then
              BACKEND_LABEL="перезапущен"
            fi

            BOT_TOKEN_VAL=$(grep -E '^BOT_TOKEN=' "$REPO_DIR/.env" | cut -d'=' -f2- | tr -d '"' | tr -d "'" | head -1)

            if [ -n "$BOT_TOKEN_VAL" ] && [ -n "${NOTIFY_CHAT_ID:-}" ]; then
              read -r -d '' MSG << ENDMSG || true
            <b>↶ ОТКАТ</b> <code>-${COMMITS_BACK}</code>

            <pre>
            Было  ${FROM_COMMIT}  ${FROM_MSG}
            Стало ${TO_COMMIT}  ${TO_MSG}
            </pre>
            <code>Бот: ${BOT_OK} · Backend: ${BACKEND_LABEL} · Frontend: ${FRONTEND_LABEL}</code>
            <code>Инициатор: ${GH_ACTOR}</code>

            <a href="${GH_RUN_URL}">Логи</a>
            ENDMSG

              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN_VAL}/sendMessage" \
                --data-urlencode "chat_id=${NOTIFY_CHAT_ID}" \
                --data-urlencode "parse_mode=HTML" \
                --data-urlencode "text=${MSG}" \
                --data-urlencode "disable_web_page_preview=true" || true
            fi

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ ОТКАТ УПАЛ</b>

            Инициатор: <code>${{ github.actor }}</code>
            Требуется ручное вмешательство.
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Логи</a>
