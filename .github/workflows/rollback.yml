name: Rollback

on:
  workflow_dispatch:
    inputs:
      commits_back:
        description: 'How many commits to rollback (default: 1)'
        required: false
        default: '1'

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Rollback via SSH
        id: rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            COMMITS_BACK=${{ github.event.inputs.commits_back }}
            cd ~/academic_saloon

            FROM=$(git rev-parse --short HEAD)
            FROM_MSG=$(git log -1 --format='%s')

            git reset --hard HEAD~$COMMITS_BACK

            TO=$(git rev-parse --short HEAD)
            TO_MSG=$(git log -1 --format='%s')

            # Rebuild frontend
            cd ~/academic_saloon/mini-app
            npm ci --prefer-offline
            npm run build

            rm -rf /var/www/academic_saloon/dist/*
            cp -r dist/* /var/www/academic_saloon/dist/
            chown -R www-data:www-data /var/www/academic_saloon/dist/

            # Restart services
            touch /tmp/saloon-deploy.lock
            systemctl stop saloon-bot 2>/dev/null || true
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 3
            systemctl start saloon-bot
            sleep 5
            rm -f /tmp/saloon-deploy.lock
            nginx -t && systemctl reload nginx

            BOT_STATUS="down"
            if systemctl is-active --quiet saloon-bot; then BOT_STATUS="ok"; fi

            echo "=== ROLLBACK: $FROM -> $TO (-$COMMITS_BACK) | Bot: $BOT_STATUS ==="
            echo "=== FROM: $FROM_MSG ==="
            echo "=== TO: $TO_MSG ==="

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *ROLLBACK*  -${{ github.event.inputs.commits_back }} commits

            Initiated by `${{ github.actor }}`
            Server reverted, frontend rebuilt, services restarted.

            [Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *ROLLBACK FAILED*

            Initiated by `${{ github.actor }}`
            Manual intervention required.
            [Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
