name: Rollback

on:
  workflow_dispatch:
    inputs:
      commits_back:
        description: 'How many commits to rollback (default: 1)'
        required: false
        default: '1'

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          GH_ACTOR: ${{ github.actor }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMITS_BACK: ${{ github.event.inputs.commits_back }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NOTIFY_CHAT_ID,GH_ACTOR,GH_RUN_URL,COMMITS_BACK
          script: |
            set -e

            cd ~/academic_saloon

            FROM=$(git rev-parse --short HEAD)
            FROM_MSG=$(git log -1 --format='%s' | head -c 60)
            git reset --hard HEAD~${COMMITS_BACK}
            TO=$(git rev-parse --short HEAD)
            TO_MSG=$(git log -1 --format='%s' | head -c 60)

            # Rebuild
            cd ~/academic_saloon/mini-app
            npm ci --prefer-offline
            npm run build

            rm -rf /var/www/academic_saloon/dist/*
            cp -r dist/* /var/www/academic_saloon/dist/
            chown -R www-data:www-data /var/www/academic_saloon/dist/

            # Restart
            touch /tmp/saloon-deploy.lock
            systemctl stop saloon-bot 2>/dev/null || true
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 3
            systemctl start saloon-bot
            sleep 5
            rm -f /tmp/saloon-deploy.lock
            nginx -t && systemctl reload nginx

            BOT_OK="✗"
            if systemctl is-active --quiet saloon-bot; then BOT_OK="●"; fi

            # Notification
            BOT_TOKEN_VAL=$(grep -E '^BOT_TOKEN=' ~/academic_saloon/.env | cut -d'=' -f2- | tr -d '"' | tr -d "'" | head -1)

            if [ -n "$BOT_TOKEN_VAL" ] && [ -n "$NOTIFY_CHAT_ID" ]; then
              read -r -d '' MSG << ENDMSG || true
            <b>↶ ОТКАТ</b>  <code>-${COMMITS_BACK}</code>

            <pre>
            Было  ${FROM}  ${FROM_MSG}
            Стало ${TO}  ${TO_MSG}
            </pre>
            <code>Бот: ${BOT_OK} · Инициатор: ${GH_ACTOR}</code>

            Фронтенд пересобран, сервисы перезапущены.
            <a href="${GH_RUN_URL}">логи</a>
            ENDMSG

              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN_VAL}/sendMessage" \
                --data-urlencode "chat_id=${NOTIFY_CHAT_ID}" \
                --data-urlencode "parse_mode=HTML" \
                --data-urlencode "text=${MSG}" \
                --data-urlencode "disable_web_page_preview=true" || true
            fi

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ ОТКАТ УПАЛ</b>

            Инициатор: <code>${{ github.actor }}</code>
            Требуется ручное вмешательство.
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Логи</a>
