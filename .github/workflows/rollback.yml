name: Rollback

on:
  workflow_dispatch:
    inputs:
      commits_back:
        description: 'How many commits to rollback (default: 1)'
        required: false
        default: '1'

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            COMMITS_BACK=${{ github.event.inputs.commits_back }}
            cd ~/academic_saloon

            FROM=$(git rev-parse --short HEAD)
            git reset --hard HEAD~$COMMITS_BACK
            TO=$(git rev-parse --short HEAD)

            # Rebuild
            cd ~/academic_saloon/mini-app
            npm ci --prefer-offline
            npm run build

            rm -rf /var/www/academic_saloon/dist/*
            cp -r dist/* /var/www/academic_saloon/dist/
            chown -R www-data:www-data /var/www/academic_saloon/dist/

            # Restart
            touch /tmp/saloon-deploy.lock
            systemctl stop saloon-bot 2>/dev/null || true
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 3
            systemctl start saloon-bot
            sleep 5
            rm -f /tmp/saloon-deploy.lock
            nginx -t && systemctl reload nginx

            echo "=== ROLLBACK: $FROM -> $TO (-$COMMITS_BACK) ==="

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *ОТКАТ*  -${{ github.event.inputs.commits_back }} коммитов

            Инициатор: `${{ github.actor }}`
            Сервер откачен, фронтенд пересобран, сервисы перезапущены.

            [Логи](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *ОТКАТ УПАЛ*

            Инициатор: `${{ github.actor }}`
            Требуется ручное вмешательство.
            [Логи](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
