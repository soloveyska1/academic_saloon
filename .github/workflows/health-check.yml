name: Health Check & Auto-Restart

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check services health
        uses: appleboy/ssh-action@v1.0.3
        id: health
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            ISSUES=""
            ACTIONS=""

            # Skip if deploy in progress
            if [ -f /tmp/saloon-deploy.lock ]; then
              echo "Deploy in progress, skipping"
              exit 0
            fi

            # --- Services ---
            if ! systemctl is-active --quiet saloon-bot; then
              fuser -k 8000/tcp 2>/dev/null || true
              sleep 2
              systemctl restart saloon-bot
              sleep 5
              if systemctl is-active --quiet saloon-bot; then
                ACTIONS="${ACTIONS}бот перезапущен, "
              else
                ISSUES="${ISSUES}бот не запустился, "
              fi
            fi

            if ! systemctl is-active --quiet nginx; then
              systemctl restart nginx
              if systemctl is-active --quiet nginx; then
                ACTIONS="${ACTIONS}nginx перезапущен, "
              else
                ISSUES="${ISSUES}nginx упал, "
              fi
            fi

            if ! systemctl is-active --quiet postgresql; then
              systemctl restart postgresql
              if systemctl is-active --quiet postgresql; then
                ACTIONS="${ACTIONS}PostgreSQL перезапущен, "
              else
                ISSUES="${ISSUES}PostgreSQL упал, "
              fi
            fi

            if ! (systemctl is-active --quiet redis-server 2>/dev/null || systemctl is-active --quiet redis 2>/dev/null); then
              if command -v redis-cli &>/dev/null && ! redis-cli ping &>/dev/null; then
                ISSUES="${ISSUES}Redis недоступен, "
              fi
            fi

            # --- Disk ---
            DISK=$(df -h / | tail -1 | awk '{print $5}' | tr -d '%')

            if [ "$DISK" -gt 80 ]; then
              journalctl --vacuum-time=3d 2>/dev/null || true
              apt-get clean 2>/dev/null || true
              find /root/backups -name '*.sql.gz' -mtime +7 -delete 2>/dev/null || true
              find /tmp -type f -mtime +1 -delete 2>/dev/null || true
              pip cache purge 2>/dev/null || true
              npm cache clean --force 2>/dev/null || true

              DISK_AFTER=$(df -h / | tail -1 | awk '{print $5}' | tr -d '%')
              ACTIONS="${ACTIONS}диск очищен ${DISK}%->${DISK_AFTER}%, "
              DISK=$DISK_AFTER

              if [ "$DISK" -gt 90 ]; then
                ISSUES="${ISSUES}диск критический ${DISK}%, "
              fi
            fi

            # --- RAM ---
            MEM=$(free | grep Mem | awk '{printf("%.0f", $3/$2 * 100)}')

            if [ "$MEM" -gt 85 ]; then
              fuser -k 8000/tcp 2>/dev/null || true
              sleep 2
              systemctl restart saloon-bot
              sleep 5
              sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true

              MEM_AFTER=$(free | grep Mem | awk '{printf("%.0f", $3/$2 * 100)}')
              ACTIONS="${ACTIONS}RAM очищена ${MEM}%->${MEM_AFTER}%, "

              if [ "$MEM_AFTER" -gt 95 ]; then
                ISSUES="${ISSUES}RAM критическая ${MEM_AFTER}%, "
              fi
            fi

            # --- API ---
            if ! curl -s --max-time 5 http://localhost:8000/health > /dev/null 2>&1; then
              if ! curl -s --max-time 5 http://localhost:8000/ > /dev/null 2>&1; then
                echo "API not responding"
              fi
            fi

            echo "DISK=${DISK}% | RAM=${MEM}% | ACTIONS: $ACTIONS | ISSUES: $ISSUES"

            if [ -n "$ISSUES" ]; then
              exit 1
            fi

      # Notify only when something went wrong
      - name: Notify Telegram (Issues)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *HEALTH ALERT*

            Один или несколько сервисов не восстановились после авто-перезапуска.

            [Подробные логи](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
