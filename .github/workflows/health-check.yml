name: Health Check & Auto-Restart

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check services health
        uses: appleboy/ssh-action@v1.0.3
        id: health
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            ISSUES=""
            ACTIONS=""
            METRICS=""

            # Skip if deploy in progress
            if [ -f /tmp/saloon-deploy.lock ]; then
              echo "Deploy in progress, skipping"
              exit 0
            fi

            # --- Services ---
            BOT="ok"; NGINX="ok"; PG="ok"; REDIS="ok"

            if ! systemctl is-active --quiet saloon-bot; then
              fuser -k 8000/tcp 2>/dev/null || true
              sleep 2
              systemctl restart saloon-bot
              sleep 5
              if systemctl is-active --quiet saloon-bot; then
                ACTIONS="${ACTIONS}bot_restarted "
                BOT="restarted"
              else
                ISSUES="${ISSUES}bot_down "
                BOT="down"
              fi
            fi

            if ! systemctl is-active --quiet nginx; then
              systemctl restart nginx
              if systemctl is-active --quiet nginx; then
                ACTIONS="${ACTIONS}nginx_restarted "
                NGINX="restarted"
              else
                ISSUES="${ISSUES}nginx_down "
                NGINX="down"
              fi
            fi

            if ! systemctl is-active --quiet postgresql; then
              systemctl restart postgresql
              if systemctl is-active --quiet postgresql; then
                ACTIONS="${ACTIONS}pg_restarted "
                PG="restarted"
              else
                ISSUES="${ISSUES}pg_down "
                PG="down"
              fi
            fi

            if ! (systemctl is-active --quiet redis-server 2>/dev/null || systemctl is-active --quiet redis 2>/dev/null); then
              if command -v redis-cli &>/dev/null && ! redis-cli ping &>/dev/null; then
                ISSUES="${ISSUES}redis_down "
                REDIS="down"
              fi
            fi

            # --- Disk ---
            DISK=$(df -h / | tail -1 | awk '{print $5}' | tr -d '%')
            DISK_USED=$(df -h / | tail -1 | awk '{print $3}')
            DISK_TOTAL=$(df -h / | tail -1 | awk '{print $2}')

            if [ "$DISK" -gt 80 ]; then
              journalctl --vacuum-time=3d 2>/dev/null || true
              apt-get clean 2>/dev/null || true
              find /root/backups -name '*.sql.gz' -mtime +7 -delete 2>/dev/null || true
              find /tmp -type f -mtime +1 -delete 2>/dev/null || true
              pip cache purge 2>/dev/null || true
              npm cache clean --force 2>/dev/null || true

              DISK_AFTER=$(df -h / | tail -1 | awk '{print $5}' | tr -d '%')
              ACTIONS="${ACTIONS}disk_cleaned_${DISK}%>${DISK_AFTER}% "
              DISK=$DISK_AFTER

              if [ "$DISK" -gt 90 ]; then
                ISSUES="${ISSUES}disk_critical_${DISK}% "
              fi
            fi

            # --- RAM ---
            MEM=$(free | grep Mem | awk '{printf("%.0f", $3/$2 * 100)}')
            MEM_USED=$(free -h | grep Mem | awk '{print $3}')
            MEM_TOTAL=$(free -h | grep Mem | awk '{print $2}')

            if [ "$MEM" -gt 85 ]; then
              fuser -k 8000/tcp 2>/dev/null || true
              sleep 2
              systemctl restart saloon-bot
              sleep 5
              sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true

              MEM_AFTER=$(free | grep Mem | awk '{printf("%.0f", $3/$2 * 100)}')
              ACTIONS="${ACTIONS}ram_cleaned_${MEM}%>${MEM_AFTER}% "

              if [ "$MEM_AFTER" -gt 95 ]; then
                ISSUES="${ISSUES}ram_critical_${MEM_AFTER}% "
              fi
              MEM=$MEM_AFTER
            fi

            # --- API check ---
            API="ok"
            if ! curl -s --max-time 5 http://localhost:8000/health > /dev/null 2>&1; then
              if ! curl -s --max-time 5 http://localhost:8000/ > /dev/null 2>&1; then
                API="no_response"
              fi
            fi

            # --- Uptime ---
            UPTIME=$(uptime -p | sed 's/up //')
            LOAD=$(cat /proc/loadavg | awk '{print $1}')

            # Output
            echo "SERVICES: bot=$BOT nginx=$NGINX pg=$PG redis=$REDIS api=$API"
            echo "RESOURCES: disk=${DISK}% (${DISK_USED}/${DISK_TOTAL}) ram=${MEM}% (${MEM_USED}/${MEM_TOTAL})"
            echo "SYSTEM: uptime=$UPTIME load=$LOAD"
            echo "ACTIONS: $ACTIONS"
            echo "ISSUES: $ISSUES"

            if [ -n "$ISSUES" ]; then
              exit 1
            fi

      # Only notify when something happened (not every 10 min)
      - name: Notify Telegram (Critical)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *HEALTH ALERT*

            One or more services failed to recover.
            Auto-restart was attempted but issues remain.

            [Full logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
