name: Health Check & Auto-Restart

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout health helper
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/server_ops.sh

      - name: Upload health helper
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: scripts/server_ops.sh
          target: /tmp/academic_saloon_ops
          overwrite: true

      - name: Check services health
        uses: appleboy/ssh-action@v1.0.3
        id: health
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REMOTE_OPS_PATH: /tmp/academic_saloon_ops/scripts/server_ops.sh
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 90s
          envs: NOTIFY_CHAT_ID,GH_RUN_URL,REMOTE_OPS_PATH
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/academic_saloon" bash "$REMOTE_OPS_PATH" health-check
