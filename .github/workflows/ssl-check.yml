name: SSL Certificate Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-ssl:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check SSL certificate expiry
        id: ssl
        run: |
          DOMAIN="academic-saloon.duckdns.org"

          EXPIRY_DATE=$(echo | openssl s_client -servername $DOMAIN -connect $DOMAIN:443 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2)

          if [ -z "$EXPIRY_DATE" ]; then
            echo "status=error" >> $GITHUB_OUTPUT
            exit 1
          fi

          EXPIRY_TS=$(date -d "$EXPIRY_DATE" +%s)
          NOW_TS=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_TS - NOW_TS) / 86400 ))
          EXPIRY_SHORT=$(date -d "$EXPIRY_DATE" +"%d %b %Y")

          echo "expiry=$EXPIRY_SHORT" >> $GITHUB_OUTPUT
          echo "days_left=$DAYS_LEFT" >> $GITHUB_OUTPUT

          # Visual bar (90 days = full)
          FILLED=$((DAYS_LEFT * 10 / 90))
          [ $FILLED -gt 10 ] && FILLED=10
          [ $FILLED -lt 0 ] && FILLED=0
          BAR=""
          for i in $(seq 1 $FILLED); do BAR="${BAR}▰"; done
          for i in $(seq $((FILLED + 1)) 10); do BAR="${BAR}▱"; done
          echo "bar=$BAR" >> $GITHUB_OUTPUT

          # Percentage
          PCT=$((DAYS_LEFT * 100 / 90))
          [ $PCT -gt 100 ] && PCT=100
          [ $PCT -lt 0 ] && PCT=0
          echo "pct=$PCT" >> $GITHUB_OUTPUT

          if [ $DAYS_LEFT -lt 7 ]; then
            echo "status=critical" >> $GITHUB_OUTPUT
          elif [ $DAYS_LEFT -lt 14 ]; then
            echo "status=warning" >> $GITHUB_OUTPUT
          else
            echo "status=ok" >> $GITHUB_OUTPUT
          fi

      - name: Notify Telegram (Critical)
        if: steps.ssl.outputs.status == 'critical'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>⚠ SSL КРИТИЧНО</b>

            <pre>
            ${{ steps.ssl.outputs.bar }}  ${{ steps.ssl.outputs.days_left }}д (${{ steps.ssl.outputs.pct }}%)
            Истекает: ${{ steps.ssl.outputs.expiry }}
            </pre>

            Выполни <code>certbot renew</code> на сервере.

      - name: Notify Telegram (Warning)
        if: steps.ssl.outputs.status == 'warning'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>◆ SSL</b>

            <pre>
            ${{ steps.ssl.outputs.bar }}  ${{ steps.ssl.outputs.days_left }}д (${{ steps.ssl.outputs.pct }}%)
            Истекает: ${{ steps.ssl.outputs.expiry }}
            </pre>

            Certbot должен обновить автоматически.

      - name: Notify Telegram (Error)
        if: steps.ssl.outputs.status == 'error'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ SSL НЕ ПРОВЕРЕН</b>

            Не удалось подключиться к серверу.
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Логи</a>
