name: Deploy to Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_run:
    workflows: ["Auto-Merge Claude Branches"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  detect-changes:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      backend_python: ${{ steps.filter.outputs.backend_python }}
      backend_python_files: ${{ steps.filter.outputs.backend_python_files }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed areas
        uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            backend:
              - 'bot/**'
              - 'core/**'
              - 'database/**'
              - 'main.py'
              - 'requirements.txt'
              - 'ops/systemd/**'
              - 'scripts/remote_deploy.sh'
              - 'scripts/systemd_prestart.sh'
              - 'scripts/systemd_reload.sh'
              - 'scripts/deploy_notify.py'
              - '.github/workflows/deploy.yml'
            backend_python:
              - 'bot/**/*.py'
              - 'core/**/*.py'
              - 'database/**/*.py'
              - 'main.py'
              - 'scripts/**/*.py'
              - 'tests/**/*.py'
            frontend:
              - 'mini-app/**'
              - 'scripts/remote_deploy.sh'
              - '.github/workflows/deploy.yml'

  test-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check --quiet -r requirements.txt ruff

      - name: Ruff lint
        env:
          CHANGED_PY_FILES: ${{ needs.detect-changes.outputs.backend_python_files }}
        run: |
          python - <<'PY'
          import os
          import shlex
          import subprocess
          import sys

          raw_files = os.environ.get("CHANGED_PY_FILES", "").strip()
          if not raw_files:
            print("No changed Python files to lint.")
            sys.exit(0)

          files = shlex.split(raw_files)
          print("Linting changed Python files:")
          for path in files:
            print(f" - {path}")

          subprocess.run(
            ["ruff", "check", *files, "--select", "E,W,F", "--ignore", "E501"],
            check=True,
          )
          PY

      - name: Run pytest
        run: pytest tests/ -q --tb=short --maxfail=5
        env:
          PYTHONPATH: .
          BOT_TOKEN: "123456:TEST-TOKEN"
          BOT_USERNAME: test_bot
          ADMIN_IDS: "[1]"
          PAYMENT_PHONE: "+70000000000"
          PAYMENT_CARD: "0000000000000000"
          PAYMENT_BANKS: "Test"
          PAYMENT_NAME: "Test"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_DB_FSM: "0"
          REDIS_DB_CACHE: "1"

  test-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mini-app/package-lock.json

      - name: Install frontend dependencies
        run: cd mini-app && npm ci --prefer-offline --no-audit

      - name: Frontend tests
        run: cd mini-app && npm test

      - name: TypeScript type check
        run: cd mini-app && npx tsc --noEmit

      - name: Vite build
        run: cd mini-app && npm run build

      - name: Package frontend bundle
        run: tar -C mini-app/dist -czf frontend-dist.tgz .

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tgz
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: [detect-changes, test-backend, test-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Download frontend bundle
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .

      - name: Upload frontend bundle to server
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: frontend-dist.tgz
          target: /tmp/academic_saloon_deploy
          overwrite: true

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          GH_COMMIT_URL: ${{ github.event.head_commit.url }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend }}
          FRONTEND_ARCHIVE_PATH: /tmp/academic_saloon_deploy/frontend-dist.tgz
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 180s
          envs: NOTIFY_CHAT_ID,GH_COMMIT_URL,GH_RUN_URL,BACKEND_CHANGED,FRONTEND_CHANGED,FRONTEND_ARCHIVE_PATH
          script: |
            set -euo pipefail

            DEPLOY_START=$(date +%s)
            REPO_DIR="$HOME/academic_saloon"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/soloveyska1/academic_saloon.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            OLD_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
            git remote set-url origin https://github.com/soloveyska1/academic_saloon.git
            git fetch origin main --prune
            git checkout main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse --short HEAD)

            export DEPLOY_START
            export REPO_DIR
            export OLD_COMMIT
            export NEW_COMMIT

            bash scripts/remote_deploy.sh

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ ДЕПЛОЙ УПАЛ</b>

            CI или удалённый rollout завершился ошибкой.

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Подробные логи</a>
