name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: pip install ruff && ruff check . --select E,W,F --ignore E501 || true

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          BOT_TOKEN: "123456:TEST-TOKEN"
          BOT_USERNAME: test_bot
          ADMIN_IDS: "[1]"
          PAYMENT_PHONE: "+70000000000"
          PAYMENT_CARD: "0000000000000000"
          PAYMENT_BANKS: "Test"
          PAYMENT_NAME: "Test"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_DB_FSM: "0"
          REDIS_DB_CACHE: "1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd mini-app && npm ci

      - name: TypeScript type check
        run: cd mini-app && npx tsc --noEmit

      - name: Frontend tests
        run: cd mini-app && npm test || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Collect deploy info
        id: info
        run: |
          set +e

          MSG=$(git log -1 --format='%s' | head -c 100)
          echo "commit_msg=$MSG" >> $GITHUB_OUTPUT

          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

          # Changed files summary
          CHANGED=$(git diff --stat HEAD~1 HEAD 2>/dev/null | tail -1)
          echo "changes=${CHANGED:-нет изменений}" >> $GITHUB_OUTPUT

          # File category counts (grep -c returns 1 on no match, so use || true)
          PY_COUNT=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -c '\.py$' || true)
          TS_COUNT=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -cE '\.(tsx?|css)$' || true)
          YML_COUNT=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -c '\.yml$' || true)
          echo "py_count=${PY_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "ts_count=${TS_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "yml_count=${YML_COUNT:-0}" >> $GITHUB_OUTPUT

          # Recent commits
          RECENT=$(git log --oneline --no-merges -5 --format='%s' | sed 's/^/  /' | head -c 500)
          {
            echo "RECENT_COMMITS<<ENDOFCOMMITS"
            echo "$RECENT"
            echo "ENDOFCOMMITS"
          } >> $GITHUB_ENV

          echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/academic_saloon || git clone https://github.com/soloveyska1/academic_saloon.git ~/academic_saloon
            cd ~/academic_saloon

            OLD_COMMIT=$(git rev-parse --short HEAD)
            git remote set-url origin https://github.com/soloveyska1/academic_saloon.git
            git fetch origin --prune
            git checkout main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse --short HEAD)

            # Backend
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt --quiet

            # Migrations
            alembic upgrade head 2>/dev/null || true

            # Restart bot
            touch /tmp/saloon-deploy.lock
            systemctl stop saloon-bot 2>/dev/null || true
            sleep 2
            fuser -k -9 8000/tcp 2>/dev/null || true
            sleep 3

            for i in {1..10}; do
                if ! fuser 8000/tcp 2>/dev/null; then break; fi
                fuser -k -9 8000/tcp 2>/dev/null || true
                sleep 2
            done

            systemctl start saloon-bot
            sleep 8
            rm -f /tmp/saloon-deploy.lock

            if ! systemctl is-active --quiet saloon-bot; then
              journalctl -u saloon-bot --no-pager -n 20
              exit 1
            fi

            # Frontend
            cd ~/academic_saloon/mini-app
            npm ci --prefer-offline
            npm run build

            rm -rf /var/www/academic_saloon/dist/*
            cp -r dist/* /var/www/academic_saloon/dist/
            chown -R www-data:www-data /var/www/academic_saloon/dist/

            nginx -t && systemctl reload nginx

            DISK=$(df -h / | tail -1 | awk '{print $5}')
            MEM=$(free | grep Mem | awk '{printf("%.0f%%", $3/$2*100)}')

            echo "=== DEPLOY: $OLD_COMMIT -> $NEW_COMMIT | Disk: $DISK | RAM: $MEM ==="

      - name: Calculate duration
        id: duration
        if: always()
        run: |
          START=${{ steps.info.outputs.start_time }}
          NOW=$(date +%s)
          SECS=$((NOW - START))
          MINS=$((SECS / 60))
          REM=$((SECS % 60))
          echo "time=${MINS}м ${REM}с" >> $GITHUB_OUTPUT

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *ДЕПЛОЙ*  `${{ steps.info.outputs.sha_short }}`  *${{ steps.duration.outputs.time }}*

            ${{ steps.info.outputs.commit_msg }}

            `py:${{ steps.info.outputs.py_count }}` `ts:${{ steps.info.outputs.ts_count }}` `ci:${{ steps.info.outputs.yml_count }}`  ${{ steps.info.outputs.changes }}

            ${{ env.RECENT_COMMITS }}

            [Коммит](${{ github.event.head_commit.url }}) | [Логи](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *ДЕПЛОЙ УПАЛ*  `${{ steps.info.outputs.sha_short }}`

            ${{ steps.info.outputs.commit_msg }}

            [Логи](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
