name: Deploy to Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Detect what changed to skip unnecessary work ───
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend || 'true' }}
      frontend: ${{ steps.filter.outputs.frontend || 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        continue-on-error: true
        with:
          filters: |
            backend:
              - '**.py'
              - 'requirements.txt'
              - 'alembic/**'
            frontend:
              - 'mini-app/**'

  # ─── Backend tests: only when Python/backend files changed ───
  test-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt --quiet

      - name: Ruff lint
        run: pip install ruff && ruff check . --select E,W,F --ignore E501 || true

      - name: Run pytest
        continue-on-error: true
        run: pytest tests/ -v --tb=short
        env:
          BOT_TOKEN: "123456:TEST-TOKEN"
          BOT_USERNAME: test_bot
          ADMIN_IDS: "[1]"
          PAYMENT_PHONE: "+70000000000"
          PAYMENT_CARD: "0000000000000000"
          PAYMENT_BANKS: "Test"
          PAYMENT_NAME: "Test"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_DB_FSM: "0"
          REDIS_DB_CACHE: "1"

  # ─── Frontend checks: only when mini-app files changed ───
  test-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: mini-app/node_modules
          key: node-modules-${{ hashFiles('mini-app/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: cd mini-app && npm ci

      - name: TypeScript type check
        run: cd mini-app && ./node_modules/.bin/tsc --noEmit

      - name: Vite build check
        run: cd mini-app && npm run build

  # ─── Deploy: waits for relevant tests, then ships ───
  deploy:
    needs: [detect-changes, test-backend, test-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          GH_COMMIT_URL: ${{ secrets.event.head_commit.url }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120s
          envs: NOTIFY_CHAT_ID,GH_COMMIT_URL,GH_RUN_URL
          script: |
            set -e
            DEPLOY_START=$(date +%s)

            cd ~/academic_saloon || git clone https://github.com/soloveyska1/academic_saloon.git ~/academic_saloon
            cd ~/academic_saloon

            OLD_COMMIT=$(git rev-parse --short HEAD)
            git remote set-url origin https://github.com/soloveyska1/academic_saloon.git
            git fetch origin --prune
            git checkout main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse --short HEAD)

            # Backend — skip pip install if requirements unchanged
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate

            REQ_HASH=$(md5sum requirements.txt | cut -d' ' -f1)
            if [ -f ".req_hash" ] && [ "$(cat .req_hash)" = "$REQ_HASH" ]; then
              echo "Requirements unchanged, skipping pip install"
            else
              pip install --upgrade pip -q
              pip install -r requirements.txt --quiet
              echo "$REQ_HASH" > .req_hash
            fi

            # Migrations
            alembic upgrade head 2>/dev/null || true

            # Restart bot
            touch /tmp/saloon-deploy.lock
            systemctl stop saloon-bot 2>/dev/null || true
            sleep 1

            # Kill anything on port 8000
            fuser -k -9 8000/tcp 2>/dev/null || true
            sleep 1
            lsof -ti:8000 | xargs -r kill -9 2>/dev/null || true

            for i in {1..3}; do
                if ! fuser 8000/tcp 2>/dev/null && ! lsof -ti:8000 >/dev/null 2>&1; then break; fi
                fuser -k -9 8000/tcp 2>/dev/null || true
                lsof -ti:8000 | xargs -r kill -9 2>/dev/null || true
                sleep 1
            done

            systemctl start saloon-bot
            sleep 2
            rm -f /tmp/saloon-deploy.lock

            # Retry check: bot may need extra time
            BOT_OK=false
            for i in {1..3}; do
                if systemctl is-active --quiet saloon-bot; then
                    BOT_OK=true
                    break
                fi
                sleep 1
            done

            if [ "$BOT_OK" != "true" ]; then
              journalctl -u saloon-bot --no-pager -n 30
              exit 1
            fi

            # Frontend — skip npm ci if lock unchanged
            cd ~/academic_saloon/mini-app
            LOCK_HASH=$(md5sum package-lock.json | cut -d' ' -f1)
            if [ -f ".lock_hash" ] && [ "$(cat .lock_hash)" = "$LOCK_HASH" ]; then
              echo "Dependencies unchanged, skipping npm ci"
            else
              echo "Installing frontend dependencies..."
              npm ci --prefer-offline 2>/dev/null || npm install
              echo "$LOCK_HASH" > .lock_hash
            fi

            echo "Building frontend..."
            npm run build
            if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
              echo "ERROR: Vite build produced no output in dist/"
              exit 1
            fi

            rm -rf /var/www/academic_saloon/dist/*
            cp -r dist/* /var/www/academic_saloon/dist/
            chown -R www-data:www-data /var/www/academic_saloon/dist/

            nginx -t && systemctl reload nginx

            # Health check: verify the app is responding
            echo "Running health check..."
            HEALTH_OK=false
            for i in {1..3}; do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/ 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
                HEALTH_OK=true
                break
              fi
              echo "Health check attempt $i: HTTP $HTTP_CODE"
              sleep 1
            done
            if [ "$HEALTH_OK" != "true" ]; then
              echo "WARNING: Health check did not return 200 (got $HTTP_CODE). Deploy may have issues."
            else
              echo "Health check passed"
            fi

            # ═══════════════════════════════════════════
            # SEND NOTIFICATION (non-blocking)
            # ═══════════════════════════════════════════

            cd ~/academic_saloon
            source venv/bin/activate

            python3 scripts/deploy_notify.py \
              --chat-id "$NOTIFY_CHAT_ID" \
              --old-commit "$OLD_COMMIT" \
              --new-commit "$NEW_COMMIT" \
              --deploy-start "$DEPLOY_START" \
              --commit-url "$GH_COMMIT_URL" \
              --logs-url "$GH_RUN_URL" \
              &
            disown

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ ДЕПЛОЙ УПАЛ</b>

            Тесты прошли, но деплой на сервер не удался.

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Подробные логи</a>
