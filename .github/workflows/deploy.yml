name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: pip install ruff && ruff check . --select E,W,F --ignore E501 || true

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          BOT_TOKEN: "123456:TEST-TOKEN"
          BOT_USERNAME: test_bot
          ADMIN_IDS: "[1]"
          PAYMENT_PHONE: "+70000000000"
          PAYMENT_CARD: "0000000000000000"
          PAYMENT_BANKS: "Test"
          PAYMENT_NAME: "Test"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_DB_FSM: "0"
          REDIS_DB_CACHE: "1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd mini-app && npm ci

      - name: TypeScript type check
        run: cd mini-app && npx tsc --noEmit

      - name: Frontend tests
        run: cd mini-app && npm test || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_COMMIT_URL: ${{ github.event.head_commit.url }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NOTIFY_CHAT_ID,GH_SHA,GH_RUN_URL,GH_COMMIT_URL
          script: |
            set -e
            DEPLOY_START=$(date +%s)

            cd ~/academic_saloon || git clone https://github.com/soloveyska1/academic_saloon.git ~/academic_saloon
            cd ~/academic_saloon

            OLD_COMMIT=$(git rev-parse --short HEAD)
            git remote set-url origin https://github.com/soloveyska1/academic_saloon.git
            git fetch origin --prune
            git checkout main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse --short HEAD)

            # Diff stats
            COMMIT_MSG=$(git log -1 --format='%s')
            DIFF_STAT=$(git diff --stat ${OLD_COMMIT}..${NEW_COMMIT} 2>/dev/null | tail -1 || echo "")
            RECENT=$(git log --oneline --no-merges -5 ${OLD_COMMIT}..${NEW_COMMIT} --format='%s' 2>/dev/null | head -5)
            PY_COUNT=$(git diff --name-only ${OLD_COMMIT}..${NEW_COMMIT} 2>/dev/null | grep -c '\.py$' || true)
            TS_COUNT=$(git diff --name-only ${OLD_COMMIT}..${NEW_COMMIT} 2>/dev/null | grep -cE '\.(tsx?|css)$' || true)
            YML_COUNT=$(git diff --name-only ${OLD_COMMIT}..${NEW_COMMIT} 2>/dev/null | grep -c '\.yml$' || true)
            DEPLOY_NUM=$(git log --oneline main | wc -l)

            # Backend
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt --quiet

            # Migrations
            alembic upgrade head 2>/dev/null || true

            # Restart bot
            touch /tmp/saloon-deploy.lock
            systemctl stop saloon-bot 2>/dev/null || true
            sleep 2
            fuser -k -9 8000/tcp 2>/dev/null || true
            sleep 3

            for i in {1..10}; do
                if ! fuser 8000/tcp 2>/dev/null; then break; fi
                fuser -k -9 8000/tcp 2>/dev/null || true
                sleep 2
            done

            systemctl start saloon-bot
            sleep 8
            rm -f /tmp/saloon-deploy.lock

            BOT_OK="false"
            if systemctl is-active --quiet saloon-bot; then BOT_OK="true"; fi

            # Frontend
            cd ~/academic_saloon/mini-app
            npm ci --prefer-offline
            npm run build

            rm -rf /var/www/academic_saloon/dist/*
            cp -r dist/* /var/www/academic_saloon/dist/
            chown -R www-data:www-data /var/www/academic_saloon/dist/

            nginx -t && systemctl reload nginx

            # ═══════════════════════════════════════════
            # COLLECT METRICS & SEND RICH NOTIFICATION
            # ═══════════════════════════════════════════

            DEPLOY_END=$(date +%s)
            DEPLOY_SECS=$((DEPLOY_END - DEPLOY_START))
            DEPLOY_MIN=$((DEPLOY_SECS / 60))
            DEPLOY_REM=$((DEPLOY_SECS % 60))

            DISK_PCT=$(df -h / | tail -1 | awk '{print $5}' | tr -d '%')
            DISK_USED=$(df -h / | tail -1 | awk '{print $3}')
            DISK_TOTAL=$(df -h / | tail -1 | awk '{print $2}')
            RAM_PCT=$(free | grep Mem | awk '{printf("%.0f", $3/$2*100)}')
            RAM_USED=$(free -h | grep Mem | awk '{print $3}')
            RAM_TOTAL=$(free -h | grep Mem | awk '{print $2}')

            BOT_RAM=$(ps aux | grep -E 'python.*main\.py|uvicorn' | grep -v grep | awk '{sum+=$6} END {printf("%.0f", sum/1024)}' 2>/dev/null || echo "0")
            BUNDLE_KB=$(du -sk /var/www/academic_saloon/dist/assets/ 2>/dev/null | awk '{print $1}' || echo "0")
            BUNDLE_MB=$(echo "scale=1; $BUNDLE_KB / 1024" | bc 2>/dev/null || echo "?")

            API_MS="—"
            API_ICON="✗"
            API_TIME=$(curl -s -o /dev/null -w '%{time_total}' --max-time 5 http://localhost:8000/health 2>/dev/null || echo "0")
            if [ "$API_TIME" != "0" ]; then
              API_MS=$(echo "$API_TIME * 1000" | bc 2>/dev/null | cut -d. -f1 || echo "?")
              API_ICON="●"
            fi

            UPTIME_STR=$(uptime -p | sed 's/up //')

            DOMAIN="academic-saloon.duckdns.org"
            SSL_DAYS="?"
            SSL_DATE=$(echo | openssl s_client -servername $DOMAIN -connect $DOMAIN:443 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
            if [ -n "$SSL_DATE" ]; then
              SSL_TS=$(date -d "$SSL_DATE" +%s 2>/dev/null || echo "0")
              NOW_TS=$(date +%s)
              if [ "$SSL_TS" -gt 0 ] 2>/dev/null; then
                SSL_DAYS=$(( (SSL_TS - NOW_TS) / 86400 ))
              fi
            fi

            # Gauge bar function
            make_bar() {
              local pct=$1 filled=$((($1 * 8 + 50) / 100)) bar=""
              [ $filled -gt 8 ] && filled=8
              [ $filled -lt 0 ] && filled=0
              for i in $(seq 1 $filled); do bar="${bar}▰"; done
              for i in $(seq $((filled + 1)) 8); do bar="${bar}▱"; done
              echo "$bar"
            }

            DISK_BAR=$(make_bar $DISK_PCT)
            RAM_BAR=$(make_bar $RAM_PCT)

            # Health score (weighted)
            HEALTH=100
            [ "$BOT_OK" = "false" ] && HEALTH=$((HEALTH - 40))
            [ "$API_ICON" = "✗" ] && HEALTH=$((HEALTH - 20))
            [ "$DISK_PCT" -gt 80 ] && HEALTH=$((HEALTH - 15))
            [ "$RAM_PCT" -gt 80 ] && HEALTH=$((HEALTH - 15))
            [ "$DISK_PCT" -gt 90 ] && HEALTH=$((HEALTH - 10))
            [ $HEALTH -lt 0 ] && HEALTH=0

            # Speed rating
            if [ $DEPLOY_SECS -lt 120 ]; then SPEED="молния"
            elif [ $DEPLOY_SECS -lt 180 ]; then SPEED="быстро"
            elif [ $DEPLOY_SECS -lt 300 ]; then SPEED="норм"
            else SPEED="долго"; fi

            # Time of day
            HOUR=$(date +%H)
            if [ $HOUR -ge 6 ] && [ $HOUR -lt 12 ]; then TOD="Утренний деплой"
            elif [ $HOUR -ge 12 ] && [ $HOUR -lt 18 ]; then TOD="Дневной деплой"
            elif [ $HOUR -ge 18 ] && [ $HOUR -lt 23 ]; then TOD="Вечерний деплой"
            else TOD="Ночной деплой"; fi

            # Bot status
            if [ "$BOT_OK" = "true" ]; then BOT_LABEL="●  ${BOT_RAM}MB"; else BOT_LABEL="✗  упал"; fi

            # Build commit list
            COMMIT_LIST=""
            while IFS= read -r line; do
              [ -n "$line" ] && COMMIT_LIST="${COMMIT_LIST}
            ▸ ${line}"
            done <<< "$RECENT"

            # File type summary
            FILE_TYPES=""
            [ "$PY_COUNT" -gt 0 ] 2>/dev/null && FILE_TYPES="${FILE_TYPES}py:${PY_COUNT} "
            [ "$TS_COUNT" -gt 0 ] 2>/dev/null && FILE_TYPES="${FILE_TYPES}ts:${TS_COUNT} "
            [ "$YML_COUNT" -gt 0 ] 2>/dev/null && FILE_TYPES="${FILE_TYPES}ci:${YML_COUNT} "

            # Send notification
            BOT_TOKEN_VAL=$(grep -E '^BOT_TOKEN=' ~/academic_saloon/.env | cut -d'=' -f2- | tr -d '"' | tr -d "'" | head -1)

            if [ -n "$BOT_TOKEN_VAL" ] && [ -n "$NOTIFY_CHAT_ID" ]; then

              read -r -d '' MSG << ENDMSG || true
            <b>● ДЕПЛОЙ</b>  <code>${NEW_COMMIT}</code>

            <i>${COMMIT_MSG}</i>
            ${COMMIT_LIST}
            <code>${FILE_TYPES}— ${DIFF_STAT}</code>

            <pre>
            Бот   ${BOT_LABEL}      Диск ${DISK_BAR} ${DISK_PCT}%
            API   ${API_ICON}  ${API_MS}ms      RAM  ${RAM_BAR} ${RAM_PCT}%
            Nginx ●            SSL  ${SSL_DAYS}д
            Бандл ${BUNDLE_MB}MB       Аптайм ${UPTIME_STR}
            </pre>
            <code>${TOD} · ${DEPLOY_MIN}м${DEPLOY_REM}с · ${SPEED} · #${DEPLOY_NUM} · ♥ ${HEALTH}/100</code>

            <a href="${GH_COMMIT_URL}">коммит</a> · <a href="${GH_RUN_URL}">логи</a>
            ENDMSG

              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN_VAL}/sendMessage" \
                --data-urlencode "chat_id=${NOTIFY_CHAT_ID}" \
                --data-urlencode "parse_mode=HTML" \
                --data-urlencode "text=${MSG}" \
                --data-urlencode "disable_web_page_preview=true" || true
            fi

            if [ "$BOT_OK" = "false" ]; then
              journalctl -u saloon-bot --no-pager -n 20
              exit 1
            fi

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ ДЕПЛОЙ УПАЛ</b>  <code>${{ github.sha }}</code>

            Тесты прошли, но деплой на сервер не удался.

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Подробные логи</a>
