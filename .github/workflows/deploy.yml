name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Ручной запуск из GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e  # Exit on any error

            echo "=== Starting deploy at $(date) ==="

            # Navigate to project directory
            cd ~/academic_saloon || git clone https://github.com/soloveyska1/academic_saloon.git ~/academic_saloon
            cd ~/academic_saloon

            echo "Current commit: $(git rev-parse --short HEAD)"

            # Ensure remote URL is correct
            git remote set-url origin https://github.com/soloveyska1/academic_saloon.git

            # Update code from GitHub
            git fetch origin --prune
            git checkout main
            git reset --hard origin/main

            echo "Updated to commit: $(git rev-parse --short HEAD)"

            # ============================================
            # BACKEND: Python dependencies
            # ============================================
            echo "=== Installing Python dependencies ==="
            cd ~/academic_saloon

            # Activate virtual environment if exists, or create it
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            source venv/bin/activate

            # Install/update dependencies
            pip install --upgrade pip
            pip install -r requirements.txt --quiet

            echo "✅ Python dependencies installed"

            # ============================================
            # DATABASE: Run migrations
            # ============================================
            echo "=== Running database migrations ==="
            cd ~/academic_saloon
            source venv/bin/activate

            # Run alembic migrations (if any pending)
            alembic upgrade head 2>/dev/null || echo "No migrations or alembic not configured"

            echo "✅ Migrations complete"

            # ============================================
            # BACKEND: Restart the bot service
            # ============================================
            echo "=== Restarting bot service ==="

            # 1. Create deploy lock (prevents health check from restarting during deploy)
            touch /tmp/saloon-deploy.lock

            # 2. Stop systemd service FIRST (prevents auto-restart after kill)
            echo "Stopping systemd service..."
            systemctl stop saloon-bot 2>/dev/null || true
            sleep 2

            # 3. Kill any remaining processes on port 8000
            echo "Cleaning up port 8000..."
            fuser -k -9 8000/tcp 2>/dev/null || true
            sleep 3

            # 4. Verify port is free (up to 10 attempts × 2s = 20s max)
            PORT_FREE=false
            for i in {1..10}; do
                if ! fuser 8000/tcp 2>/dev/null; then
                    echo "  ✓ Port 8000 is free (attempt $i)."
                    PORT_FREE=true
                    break
                fi
                echo "  Port 8000 still occupied (attempt $i/10)..."
                fuser -k -9 8000/tcp 2>/dev/null || true
                sleep 2
            done

            if [ "$PORT_FREE" = "false" ]; then
                echo "  ⚠️ Port 8000 still occupied after 10 attempts, forcing..."
                kill -9 $(lsof -t -i:8000) 2>/dev/null || true
                sleep 3
            fi

            # 5. Start systemd service
            echo "Starting systemd service..."
            systemctl start saloon-bot
            sleep 8

            # 6. Remove deploy lock
            rm -f /tmp/saloon-deploy.lock

            # Verify bot is running
            if systemctl is-active --quiet saloon-bot; then
                echo "✅ Bot service is running"
            else
                echo "❌ Bot service failed to start"
                journalctl -u saloon-bot --no-pager -n 20
                exit 1
            fi

            # ============================================
            # FRONTEND: Build and deploy mini-app
            # ============================================
            echo "=== Building mini-app ==="
            cd ~/academic_saloon/mini-app

            # Install dependencies and build
            npm ci --prefer-offline
            npm run build

            # Deploy to web directory
            echo "=== Deploying mini-app to /var/www ==="
            rm -rf /var/www/academic_saloon/dist/*
            cp -r dist/* /var/www/academic_saloon/dist/
            chown -R www-data:www-data /var/www/academic_saloon/dist/

            # Reload nginx to clear any cache
            nginx -t && systemctl reload nginx

            echo "✅ Mini-app deployed: $(ls /var/www/academic_saloon/dist/assets/index-*.js)"

            echo "=== Deploy completed successfully at $(date) ==="

      # ============================================
      # TELEGRAM NOTIFICATIONS
      # ============================================
      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *Deploy успешен!*

            📦 Коммит: `${{ github.sha }}`
            👤 Автор: ${{ github.actor }}
            📝 Сообщение: ${{ github.event.head_commit.message }}

            🔗 [Посмотреть коммит](${{ github.event.head_commit.url }})

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *Deploy провалился!*

            📦 Коммит: `${{ github.sha }}`
            👤 Автор: ${{ github.actor }}
            📝 Сообщение: ${{ github.event.head_commit.message }}

            🔗 [Посмотреть логи](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
