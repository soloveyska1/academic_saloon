name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Detect what changed to skip unnecessary work ───
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '**.py'
              - 'requirements.txt'
              - 'alembic/**'
            frontend:
              - 'mini-app/**'

  # ─── Backend tests: only when Python/backend files changed ───
  test-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt --quiet --prefer-offline

      - name: Ruff lint
        run: pip install ruff && ruff check . --select E,W,F --ignore E501 || true

      - name: Run pytest
        continue-on-error: true
        run: pytest tests/ -v --tb=short
        env:
          BOT_TOKEN: "123456:TEST-TOKEN"
          BOT_USERNAME: test_bot
          ADMIN_IDS: "[1]"
          PAYMENT_PHONE: "+70000000000"
          PAYMENT_CARD: "0000000000000000"
          PAYMENT_BANKS: "Test"
          PAYMENT_NAME: "Test"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_DB_FSM: "0"
          REDIS_DB_CACHE: "1"

  # ─── Frontend checks: only when mini-app files changed ───
  test-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mini-app/package-lock.json'

      - name: Install frontend dependencies
        run: cd mini-app && npm ci

      - name: TypeScript type check
        run: cd mini-app && npx tsc --noEmit

      - name: Frontend tests
        run: cd mini-app && npm test || true

  # ─── Deploy: waits for relevant tests, then ships ───
  deploy:
    needs: [detect-changes, test-backend, test-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          GH_COMMIT_URL: ${{ github.event.head_commit.url }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NOTIFY_CHAT_ID,GH_COMMIT_URL,GH_RUN_URL
          script: |
            set -e
            DEPLOY_START=$(date +%s)

            cd ~/academic_saloon || git clone https://github.com/soloveyska1/academic_saloon.git ~/academic_saloon
            cd ~/academic_saloon

            OLD_COMMIT=$(git rev-parse --short HEAD)
            git remote set-url origin https://github.com/soloveyska1/academic_saloon.git
            git fetch origin --prune
            git checkout main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse --short HEAD)

            # Backend
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt --quiet --prefer-offline

            # Migrations
            alembic upgrade head 2>/dev/null || true

            # Restart bot
            touch /tmp/saloon-deploy.lock
            systemctl stop saloon-bot 2>/dev/null || true
            sleep 1

            # Kill anything on port 8000
            fuser -k -9 8000/tcp 2>/dev/null || true
            sleep 1
            lsof -ti:8000 | xargs -r kill -9 2>/dev/null || true

            for i in {1..10}; do
                if ! fuser 8000/tcp 2>/dev/null && ! lsof -ti:8000 >/dev/null 2>&1; then break; fi
                fuser -k -9 8000/tcp 2>/dev/null || true
                lsof -ti:8000 | xargs -r kill -9 2>/dev/null || true
                sleep 1
            done

            systemctl start saloon-bot
            sleep 3
            rm -f /tmp/saloon-deploy.lock

            # Retry check: bot may need extra time
            BOT_OK=false
            for i in {1..3}; do
                if systemctl is-active --quiet saloon-bot; then
                    BOT_OK=true
                    break
                fi
                sleep 2
            done

            if [ "$BOT_OK" != "true" ]; then
              journalctl -u saloon-bot --no-pager -n 30
              exit 1
            fi

            # Frontend
            cd ~/academic_saloon/mini-app
            npm ci --prefer-offline
            npm run build

            rm -rf /var/www/academic_saloon/dist/*
            cp -r dist/* /var/www/academic_saloon/dist/
            chown -R www-data:www-data /var/www/academic_saloon/dist/

            nginx -t && systemctl reload nginx

            # ═══════════════════════════════════════════
            # SEND PREMIUM NOTIFICATION
            # ═══════════════════════════════════════════

            cd ~/academic_saloon
            source venv/bin/activate

            python3 scripts/deploy_notify.py \
              --chat-id "$NOTIFY_CHAT_ID" \
              --old-commit "$OLD_COMMIT" \
              --new-commit "$NEW_COMMIT" \
              --deploy-start "$DEPLOY_START" \
              --commit-url "$GH_COMMIT_URL" \
              --logs-url "$GH_RUN_URL" \
              || echo "Notification script failed (non-fatal)"

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: html
          message: |
            <b>✗ ДЕПЛОЙ УПАЛ</b>

            Тесты прошли, но деплой на сервер не удался.

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Подробные логи</a>
