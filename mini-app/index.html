<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Academic Saloon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function () {
        var STORAGE_KEY = 'academic_saloon_theme'
        var FALLBACK_THEME = 'dark'
        var theme = FALLBACK_THEME

        try {
          var savedTheme = window.localStorage.getItem(STORAGE_KEY)
          if (savedTheme === 'light' || savedTheme === 'dark') {
            theme = savedTheme
          }
        } catch (_) {}

        var colors = theme === 'light'
          ? { header: '#FAFAF9', background: '#FAFAF9' }
          : { header: '#121212', background: '#0A0A0A' }

        document.documentElement.setAttribute('data-theme', theme)

        var metaThemeColor = document.querySelector('meta[name="theme-color"]')
        if (metaThemeColor) {
          metaThemeColor.setAttribute('content', colors.header)
        }

        document.documentElement.style.backgroundColor = colors.background
        document.documentElement.style.colorScheme = theme
        document.documentElement.style.visibility = 'visible'

        if (document.body) {
          document.body.style.backgroundColor = colors.background
        } else {
          document.addEventListener('DOMContentLoaded', function () {
            document.body.style.backgroundColor = colors.background
          }, { once: true })
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
